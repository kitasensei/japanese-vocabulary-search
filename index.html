<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>日本語単語検索</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>日本語単語検索</h1>
      <p>教科書の分からない言葉を入力してください。</p>
    </header>

    <section class="search-panel" aria-label="単語検索">
      <label class="search-label" for="searchInput">日本語・ひらがな</label>
      <div class="search-row">
        <input
          id="searchInput"
          type="search"
          inputmode="search"
          autocomplete="off"
          placeholder="例：食べます、たべます"
          aria-describedby="searchHelp"
        >
        <button id="clearButton" type="button" aria-label="検索文字を消す">消去</button>
      </div>
      <p id="searchHelp" class="search-help">入力した文字を含むデータをすべて表示します。</p>
    </section>

    <section class="results-section" aria-live="polite" aria-busy="true">
      <div class="results-header">
        <p id="statusText">データを読み込んでいます…</p>
      </div>
      <div id="results" class="results"></div>
    </section>
  </main>

  <template id="resultCardTemplate">
    <article class="result-card">
      <div class="word-row">
        <h2 class="japanese"></h2>
        <span class="lesson"></span>
      </div>
      <p class="reading-row"><span class="field-label">読み</span><span class="reading"></span></p>
      <dl class="details">
        <div class="detail english-detail">
          <dt>英語</dt>
          <dd class="english"></dd>
        </div>
        <div class="detail thai-detail">
          <dt>タイ語</dt>
          <dd class="thai"></dd>
        </div>
        <div class="detail thai-reading-detail">
          <dt>タイ語読み</dt>
          <dd class="thai-reading"></dd>
        </div>
      </dl>
    </article>
  </template>

  <script>
    'use strict';

    const DATA_FILE = 'data.csv';

    const searchInput = document.getElementById('searchInput');
    const clearButton = document.getElementById('clearButton');
    const statusText = document.getElementById('statusText');
    const results = document.getElementById('results');
    const resultsSection = document.querySelector('.results-section');
    const cardTemplate = document.getElementById('resultCardTemplate');

    let vocabulary = [];

    function normalizeText(value) {
      return String(value ?? '')
        .normalize('NFKC')
        .trim()
        .toLowerCase()
        .replace(/[ァ-ヶ]/g, character =>
          String.fromCharCode(character.charCodeAt(0) - 0x60)
        );
    }

    function parseCsv(text) {
      const source = text.replace(/^\uFEFF/, '');
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let index = 0; index < source.length; index += 1) {
        const character = source[index];
        const nextCharacter = source[index + 1];

        if (character === '"') {
          if (inQuotes && nextCharacter === '"') {
            field += '"';
            index += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (character === ',' && !inQuotes) {
          row.push(field);
          field = '';
        } else if ((character === '\n' || character === '\r') && !inQuotes) {
          if (character === '\r' && nextCharacter === '\n') {
            index += 1;
          }
          row.push(field);
          field = '';
          if (row.some(cell => cell.trim() !== '')) {
            rows.push(row);
          }
          row = [];
        } else {
          field += character;
        }
      }

      row.push(field);
      if (row.some(cell => cell.trim() !== '')) {
        rows.push(row);
      }

      return rows;
    }

    function rowToEntry(row) {
      return {
        japanese: (row[0] ?? '').trim(),
        reading: (row[1] ?? '').trim(),
        lesson: (row[2] ?? '').trim(),
        english: (row[3] ?? '').trim(),
        thai: (row[4] ?? '').trim(),
        thaiReading: (row[5] ?? '').trim()
      };
    }

    function setOptionalField(card, selector, value) {
      const detail = card.querySelector(selector);
      if (!value) {
        detail.hidden = true;
        return;
      }
      detail.querySelector('dd').textContent = value;
    }

    function createResultCard(entry) {
      const card = cardTemplate.content.cloneNode(true);
      const article = card.querySelector('.result-card');

      article.querySelector('.japanese').textContent = entry.japanese;
      article.querySelector('.lesson').textContent = entry.lesson;
      article.querySelector('.reading').textContent = entry.reading || '—';
      article.querySelector('.english').textContent = entry.english || '—';

      setOptionalField(article, '.thai-detail', entry.thai);
      setOptionalField(article, '.thai-reading-detail', entry.thaiReading);

      return card;
    }

    function renderResults() {
      const query = normalizeText(searchInput.value);
      results.replaceChildren();

      if (!query) {
        statusText.textContent = `登録データ：${vocabulary.length.toLocaleString('ja-JP')}件`;
        const message = document.createElement('p');
        message.className = 'empty-message';
        message.textContent = '検索する日本語を入力してください。';
        results.appendChild(message);
        return;
      }

      const matches = vocabulary.filter(entry => {
        const japanese = normalizeText(entry.japanese);
        const reading = normalizeText(entry.reading);
        return japanese.includes(query) || reading.includes(query);
      });

      statusText.textContent = `${matches.length.toLocaleString('ja-JP')}件見つかりました`;

      if (matches.length === 0) {
        const message = document.createElement('p');
        message.className = 'empty-message';
        message.textContent = '該当するデータはありません。';
        results.appendChild(message);
        return;
      }

      const fragment = document.createDocumentFragment();
      matches.forEach(entry => fragment.appendChild(createResultCard(entry)));
      results.appendChild(fragment);
    }

    async function loadVocabulary() {
      try {
        const response = await fetch(`${DATA_FILE}?v=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`CSVの読み込みに失敗しました（${response.status}）`);
        }

        const csvText = await response.text();
        const rows = parseCsv(csvText);

        vocabulary = rows
          .slice(1)
          .map(rowToEntry)
          .filter(entry => entry.japanese !== '');

        resultsSection.setAttribute('aria-busy', 'false');
        renderResults();
      } catch (error) {
        console.error(error);
        resultsSection.setAttribute('aria-busy', 'false');
        statusText.textContent = 'データを読み込めませんでした。';
        const message = document.createElement('p');
        message.className = 'error-message';
        message.textContent = 'data.csvが同じフォルダにあるか確認してください。';
        results.replaceChildren(message);
      }
    }

    searchInput.addEventListener('input', renderResults);

    clearButton.addEventListener('click', () => {
      searchInput.value = '';
      searchInput.focus();
      renderResults();
    });

    loadVocabulary();
  </script>
</body>
</html>
