<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>いろどり単語検索</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>いろどり単語検索</h1>
      <p>『いろどり 生活の日本語』の分からない言葉を入力してください。</p>
    </header>

    <section class="search-panel" aria-label="単語検索">
      <div id="databaseControls" class="database-controls" hidden>
        <label class="database-label" for="databaseSelect">データベース</label>
        <select id="databaseSelect"></select>
      </div>

      <label class="search-label" for="searchInput">日本語・ひらがな</label>
      <div class="search-row">
        <input
          id="searchInput"
          type="search"
          inputmode="search"
          autocomplete="off"
          placeholder="例：食べます、たべます"
          aria-describedby="searchHelp"
        >
        <button id="clearButton" type="button" aria-label="検索文字を消す">消去</button>
      </div>
      <p id="searchHelp" class="search-help">入力した文字を含むデータをすべて表示します。</p>

      <div class="csv-controls">
        <label class="csv-button" for="csvFileInput">CSVを選択</label>
        <input id="csvFileInput" type="file" accept=".csv,text/csv" hidden>
        <p id="dataSourceText" class="data-source">標準データ：data.csv</p>
      </div>

      <fieldset class="display-settings">
        <legend>表示する項目</legend>
        <div id="displayOptions" class="display-options"></div>
      </fieldset>
    </section>

    <section class="results-section" aria-live="polite" aria-busy="true">
      <div class="results-header">
        <p id="statusText">データを読み込んでいます…</p>
      </div>
      <div id="results" class="results"></div>
    </section>

    <footer id="siteFooter" class="site-footer">
      <p>出典：国際交流基金日本語国際センター『いろどり 生活の日本語』</p>
      <p>本ページは無料の非公式学習支援ツールです。</p>
    </footer>
  </main>

  <template id="resultCardTemplate">
    <article class="result-card">
      <div class="word-row">
        <h2 class="japanese"></h2>
        <span class="lesson"></span>
      </div>
      <p class="reading-row"><span class="field-label">読み</span><span class="reading"></span></p>
      <dl class="details"></dl>
    </article>
  </template>

  <script>
    'use strict';

    const DATABASES = Object.freeze([
      { file: 'data.csv', label: 'data.csv', required: true },
      { file: 'data1.csv', label: 'data1.csv', required: false }
    ]);
    const DATABASE_SETTINGS_KEY = 'irodori-vocabulary-selected-database';
    const DISPLAY_SETTINGS_KEY = 'irodori-vocabulary-visible-fields';

    // 表示項目を増やす場合は、この設定に1項目追加します。
    // columnはCSVの左端を0とした列番号です。
    const OPTIONAL_FIELDS = Object.freeze([
      {
        key: 'english',
        label: '英語',
        column: 3,
        detailClass: 'english-detail',
        valueClass: 'english',
        showWhenEmpty: true
      },
      {
        key: 'thai',
        label: 'タイ語',
        column: 4,
        detailClass: 'thai-detail',
        valueClass: 'thai',
        showWhenEmpty: false
      },
      {
        key: 'thaiReading',
        label: 'タイ語カタカナ読み',
        column: 5,
        detailClass: 'thai-reading-detail',
        valueClass: 'thai-reading',
        showWhenEmpty: false
      }
    ]);

    const databaseControls = document.getElementById('databaseControls');
    const databaseSelect = document.getElementById('databaseSelect');
    const searchInput = document.getElementById('searchInput');
    const clearButton = document.getElementById('clearButton');
    const csvFileInput = document.getElementById('csvFileInput');
    const dataSourceText = document.getElementById('dataSourceText');
    const displayOptions = document.getElementById('displayOptions');
    const statusText = document.getElementById('statusText');
    const results = document.getElementById('results');
    const resultsSection = document.querySelector('.results-section');
    const cardTemplate = document.getElementById('resultCardTemplate');
    const siteFooter = document.getElementById('siteFooter');

    let vocabulary = [];
    let fieldVisibility = {};
    let availableDatabases = [];
    const databaseCsvTexts = new Map();

    function loadFieldVisibility() {
      try {
        const savedSettings = JSON.parse(localStorage.getItem(DISPLAY_SETTINGS_KEY));
        return savedSettings && typeof savedSettings === 'object' ? savedSettings : {};
      } catch (error) {
        console.warn('表示設定を読み込めませんでした。', error);
        return {};
      }
    }

    function isFieldVisible(field) {
      return fieldVisibility[field.key] ?? true;
    }

    function saveFieldVisibility() {
      try {
        localStorage.setItem(DISPLAY_SETTINGS_KEY, JSON.stringify(fieldVisibility));
      } catch (error) {
        console.warn('表示設定を保存できませんでした。', error);
      }
    }

    function renderDisplayOptions() {
      const fragment = document.createDocumentFragment();

      OPTIONAL_FIELDS.forEach(field => {
        const label = document.createElement('label');
        label.className = 'display-option';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = isFieldVisible(field);
        checkbox.dataset.fieldKey = field.key;

        const labelText = document.createElement('span');
        labelText.textContent = field.label;

        checkbox.addEventListener('change', () => {
          fieldVisibility[field.key] = checkbox.checked;
          saveFieldVisibility();
          renderResults();
        });

        label.append(checkbox, labelText);
        fragment.appendChild(label);
      });

      displayOptions.replaceChildren(fragment);
    }

    function normalizeText(value) {
      return String(value ?? '')
        .normalize('NFKC')
        .trim()
        .toLowerCase()
        .replace(/[ァ-ヶ]/g, character =>
          String.fromCharCode(character.charCodeAt(0) - 0x60)
        );
    }

    function parseCsv(text) {
      const source = text.replace(/^\uFEFF/, '');
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let index = 0; index < source.length; index += 1) {
        const character = source[index];
        const nextCharacter = source[index + 1];

        if (character === '"') {
          if (inQuotes && nextCharacter === '"') {
            field += '"';
            index += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (character === ',' && !inQuotes) {
          row.push(field);
          field = '';
        } else if ((character === '\n' || character === '\r') && !inQuotes) {
          if (character === '\r' && nextCharacter === '\n') {
            index += 1;
          }
          row.push(field);
          field = '';
          if (row.some(cell => cell.trim() !== '')) {
            rows.push(row);
          }
          row = [];
        } else {
          field += character;
        }
      }

      row.push(field);
      if (row.some(cell => cell.trim() !== '')) {
        rows.push(row);
      }

      return rows;
    }

    function rowToEntry(row) {
      const entry = {
        japanese: (row[0] ?? '').trim(),
        reading: (row[1] ?? '').trim(),
        lesson: (row[2] ?? '').trim()
      };

      OPTIONAL_FIELDS.forEach(field => {
        entry[field.key] = (row[field.column] ?? '').trim();
      });

      return entry;
    }

    function applyCsvText(csvText, sourceLabel) {
      const rows = parseCsv(csvText);
      const entries = rows
        .slice(1)
        .map(rowToEntry)
        .filter(entry => entry.japanese !== '');

      if (entries.length === 0) {
        throw new Error('有効な単語データが見つかりません。');
      }

      vocabulary = entries;
      dataSourceText.textContent = sourceLabel;
      resultsSection.setAttribute('aria-busy', 'false');
      renderResults();
    }

    function createResultCard(entry) {
      const card = cardTemplate.content.cloneNode(true);
      const article = card.querySelector('.result-card');
      const details = article.querySelector('.details');

      article.querySelector('.japanese').textContent = entry.japanese;
      article.querySelector('.lesson').textContent = entry.lesson;
      article.querySelector('.reading').textContent = entry.reading || '—';

      OPTIONAL_FIELDS.forEach(field => {
        if (!isFieldVisible(field)) {
          return;
        }

        const value = entry[field.key];
        if (!value && !field.showWhenEmpty) {
          return;
        }

        const detail = document.createElement('div');
        detail.className = `detail ${field.detailClass}`;

        const term = document.createElement('dt');
        term.textContent = field.label;

        const description = document.createElement('dd');
        description.className = field.valueClass;
        description.textContent = value || '—';

        detail.append(term, description);
        details.appendChild(detail);
      });

      details.hidden = details.childElementCount === 0;
      return card;
    }

    function updateFooterVisibility(query) {
      siteFooter.classList.toggle('is-hidden', Boolean(query));
    }

    function renderResults() {
      const query = normalizeText(searchInput.value);
      results.replaceChildren();
      updateFooterVisibility(query);

      if (!query) {
        statusText.textContent = `登録データ：${vocabulary.length.toLocaleString('ja-JP')}件`;
        const message = document.createElement('p');
        message.className = 'empty-message';
        message.textContent = '検索する日本語を入力してください。';
        results.appendChild(message);
        return;
      }

      const matches = vocabulary.filter(entry => {
        const japanese = normalizeText(entry.japanese);
        const reading = normalizeText(entry.reading);
        return japanese.includes(query) || reading.includes(query);
      });

      statusText.textContent = `${matches.length.toLocaleString('ja-JP')}件見つかりました`;

      if (matches.length === 0) {
        const message = document.createElement('p');
        message.className = 'empty-message';
        message.textContent = '該当するデータはありません。';
        results.appendChild(message);
        return;
      }

      const fragment = document.createDocumentFragment();
      matches.forEach(entry => fragment.appendChild(createResultCard(entry)));
      results.appendChild(fragment);
    }

    function loadSavedDatabaseFile() {
      try {
        return localStorage.getItem(DATABASE_SETTINGS_KEY);
      } catch (error) {
        console.warn('データベースの選択を読み込めませんでした。', error);
        return null;
      }
    }

    function saveSelectedDatabase(file) {
      try {
        localStorage.setItem(DATABASE_SETTINGS_KEY, file);
      } catch (error) {
        console.warn('データベースの選択を保存できませんでした。', error);
      }
    }

    function renderDatabaseOptions() {
      const fragment = document.createDocumentFragment();

      availableDatabases.forEach(database => {
        const option = document.createElement('option');
        option.value = database.file;
        option.textContent = database.label;
        fragment.appendChild(option);
      });

      databaseSelect.replaceChildren(fragment);
      databaseControls.hidden = availableDatabases.length < 2;
    }

    function applyDatabase(database) {
      const csvText = databaseCsvTexts.get(database.file);
      if (!csvText) {
        throw new Error(`${database.file}のデータがありません。`);
      }

      databaseSelect.value = database.file;
      applyCsvText(csvText, `データベース：${database.label}`);
    }

    async function loadAvailableDatabases() {
      try {
        const loadedDatabases = await Promise.all(
          DATABASES.map(async database => {
            const response = await fetch(
              `${database.file}?v=${Date.now()}`,
              { cache: 'no-store' }
            );

            if (!response.ok) {
              if (database.required) {
                throw new Error(
                  `${database.file}の読み込みに失敗しました（${response.status}）`
                );
              }
              return null;
            }

            return {
              database,
              csvText: await response.text()
            };
          })
        );

        databaseCsvTexts.clear();
        availableDatabases = loadedDatabases
          .filter(Boolean)
          .map(loaded => {
            databaseCsvTexts.set(loaded.database.file, loaded.csvText);
            return loaded.database;
          });

        renderDatabaseOptions();

        const savedFile = availableDatabases.length > 1
          ? loadSavedDatabaseFile()
          : null;
        const initialDatabase =
          availableDatabases.find(database => database.file === savedFile) ??
          availableDatabases[0];

        applyDatabase(initialDatabase);
      } catch (error) {
        console.error(error);
        resultsSection.setAttribute('aria-busy', 'false');
        statusText.textContent = 'データを読み込めませんでした。';
        const message = document.createElement('p');
        message.className = 'error-message';
        message.textContent = 'data.csvが同じフォルダにあるか確認してください。';
        results.replaceChildren(message);
      }
    }

    async function loadSelectedCsv(file) {
      if (!file) {
        return;
      }

      try {
        resultsSection.setAttribute('aria-busy', 'true');
        statusText.textContent = '選択したCSVを読み込んでいます…';
        const csvText = await file.text();
        applyCsvText(csvText, `選択中：${file.name}`);
        searchInput.focus();
      } catch (error) {
        console.error(error);
        resultsSection.setAttribute('aria-busy', 'false');
        statusText.textContent = '選択したCSVを読み込めませんでした。';
        const message = document.createElement('p');
        message.className = 'error-message';
        message.textContent = 'CSVの列順と文字コードを確認してください。';
        results.replaceChildren(message);
      } finally {
        csvFileInput.value = '';
      }
    }

    databaseSelect.addEventListener('change', () => {
      const selectedDatabase = availableDatabases.find(
        database => database.file === databaseSelect.value
      );

      if (!selectedDatabase) {
        return;
      }

      saveSelectedDatabase(selectedDatabase.file);
      applyDatabase(selectedDatabase);
      searchInput.focus();
    });

    searchInput.addEventListener('input', renderResults);

    clearButton.addEventListener('click', () => {
      searchInput.value = '';
      searchInput.focus();
      renderResults();
    });

    csvFileInput.addEventListener('change', event => {
      loadSelectedCsv(event.target.files[0]);
    });

    fieldVisibility = loadFieldVisibility();
    renderDisplayOptions();
    loadAvailableDatabases();
  </script>
</body>
</html>
